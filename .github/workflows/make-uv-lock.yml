name: Make uv.lock

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  make-uv-lock:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7.0.0

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990

    - name: Set up Python
      uses: actions/setup-python@v6.2.0
      with:
        python-version: '3.13'

    - name: Install Dependencies
      run: |
        uv sync

    - name: Archive uv.lock
      uses: actions/upload-artifact@v7
      with:
        name: uv-lock
        path: uv.lock
