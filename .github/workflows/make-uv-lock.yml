name: Make uv.lock

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  make-uv-lock:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install Dependencies
      run: |
        uv sync

    - name: Archive uv.lock
      uses: actions/upload-artifact@v7
      with:
        name: uv-lock
        path: uv.lock
